<!DOCTYPE html>
<html>
<head>
  <title>Device Mix Portfolio Form</title>
</head>
<body>
  <h1>Device Mix Portfolio Form</h1>
  <form id="deviceMixForm">
    <label for="productId">Product ID:</label>
    <input type="text" id="productId" name="productId" value ="1000"required><br>

    <label for="product">Product Name:</label>
    <input type="text" id="product" name="product" value='Surface Laptop 5 13" - Metal Intel i7 16GB DRAM 256GB SSD'required><br>

    <label for="countryCode">Country Code:</label>
    <input type="text" id="countryCode" name="countryCode" value="US" required><br>

    <label for="country">Country:</label>
    <input type="text" id="country" name="country" value="United States" required><br>

    <label for="quantity">Quantity:</label>
    <input type="number" id="quantity" name="quantity" value="3" required><br>

    <label for="years">Years:</label>
    <input type="number" id="years" name="years" value="2" required><br>

    <button type="submit">Submit</button>
  </form>
  <div id="response"></div>

  <script>
const form = document.querySelector('#deviceMixForm');
    const responseDiv = document.querySelector('#response');

    form.addEventListener('submit', (event) => {
      event.preventDefault();

      const data = {
        deviceMixPortfolio: [
          {
            seqNo: 1,
            productId: form.productId.value,
            product: form.product.value,
            countryCode: form.countryCode.value,
            country: form.country.value,
            quantity: parseInt(form.quantity.value),
            years: parseInt(form.years.value),
          }
        ]
      };

      fetch("https://tco-api-ms-prod-new.azurewebsites.net/api/sus-report?code=REDACTED_AZURE_FUNCTION_KEY=", {
        headers: {
          'accept': '*/*',
          'accept-language': 'en,de;q=0.9,en-IN;q=0.8,en-US;q=0.7,te;q=0.6',
          'content-type': 'text/plain;charset=UTF-8',
          'sec-ch-ua': '"Chromium";v="112", "Google Chrome";v="112", "Not:A-Brand";v="99"',
          'sec-ch-ua-mobile': '?0',
          'sec-ch-ua-platform': '"Windows"',
          'sec-fetch-dest': 'empty',
          'sec-fetch-mode': 'cors',
          'sec-fetch-site': 'cross-site'
        },
        referrerPolicy: 'same-origin',
        method: 'POST',
        body: JSON.stringify(data),
      })
      .then(response => response.json())
      .then(data => {
        console.log('Success:', data);
        responseDiv.innerHTML = `
  <h2>Response:</h2>
  ${data.value.totalCO2Emissions !== undefined ? `<p>Total CO2 Emissions: ${data.value.totalCO2Emissions}</p>` : ''}
  ${data.value.totalEmissionsDetail && data.value.totalEmissionsDetail.length ? `
    <table>
      <thead>
        <tr>
          <th>Label</th>
          <th>Value</th>
        </tr>
      </thead>
      <tbody>
        ${data.value.totalEmissionsDetail.map(item => `
          <tr>
            <td>${item.label}</td>
            <td>${item.value}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  ` : '<p>No emissions detail available.</p>'}
`;

      })
      .catch((error) => {
        console.error('Error:', error);
        alert('An error occurred while submitting the request.');
      });
    });
  </script>
</body>
</html>
