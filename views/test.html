<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.5.3/jspdf.min.js"></script>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Age</th>
      <th>Occupation</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>John Doe</td>
      <td>25</td>
      <td>Software Engineer</td>
    </tr>
    <tr>
      <td>Jane Doe</td>
      <td>23</td>
      <td>Doctor</td>
    </tr>
    <tr>
      <td>Peter Smith</td>
      <td>30</td>
      <td>Lawyer</td>
    </tr>
  </tbody>
</table>

<script>
  // Create a new PDF document
  var doc = new jsPDF();

  // Add the HTML table to the PDF document
  doc.addHTML(document.getElementById('table'));

  // Save the PDF document
  doc.save('table.pdf');
</script>
